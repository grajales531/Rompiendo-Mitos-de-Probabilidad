<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 2: ¿Puedes ganarle al casino?</title>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --casino-green: #1a5e3a;
            --gold: #d4af37;
            --dark: #0f0f0f;
            --text-light: #e0e0e0;
            --red: #d63031;
            --black: #2d3436;
            --green: #27ae60;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, var(--casino-green) 0%, var(--dark) 80%);
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px; color: var(--gold);
            text-decoration: none; border: 1px solid var(--gold); padding: 5px 15px;
            border-radius: 5px; transition: 0.3s; z-index: 10;
        }
        .back-btn:hover { background: var(--gold); color: var(--dark); }

        header { text-align: center; padding: 2rem; }
        h1 { font-family: 'Goldman', cursive; color: var(--gold); }

        .myth-box {
            background: rgba(0, 0, 0, 0.6); border-left: 5px solid var(--gold);
            padding: 1rem; margin: 1rem; max-width: 800px; border-radius: 0 10px 10px 0;
        }

        .game-layout {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem;
            width: 95%; max-width: 1100px; margin-bottom: 2rem;
        }

        .roulette-section {
            flex: 1; min-width: 320px; background: rgba(0,0,0,0.3);
            padding: 2rem; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            text-align: center;
        }

        /* Ruleta Visual */
        .wheel-container {
            width: 250px; height: 250px; margin: 0 auto 2rem; position: relative;
        }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #3d2b1f;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            position: relative;
        }
        .wheel-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 25px solid var(--gold);
            z-index: 5;
        }

        .betting-controls { display: flex; flex-direction: column; gap: 1rem; }
        .bet-options { display: flex; justify-content: center; gap: 10px; }
        .bet-btn {
            padding: 15px 25px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.2s; color: white;
        }
        .bet-red { background: var(--red); }
        .bet-black { background: var(--black); }
        .bet-green { background: var(--green); }
        .bet-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .bet-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .amount-selector { margin-bottom: 1rem; }
        .amount-selector input {
            background: #111; color: var(--gold); border: 1px solid var(--gold);
            padding: 5px; width: 80px; text-align: center; border-radius: 5px;
        }

        .stats-panel {
            flex: 0 0 280px; background: rgba(0,0,0,0.5); padding: 1.5rem;
            border-radius: 15px; border: 1px solid var(--gold);
        }
        .balance-card {
            background: var(--dark); padding: 1rem; border-radius: 10px;
            text-align: center; margin-bottom: 1.5rem; border: 1px solid var(--gold);
        }
        .balance-card h2 { color: var(--gold-bright); margin: 0; }

        .history-list {
            height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3);
            padding: 10px; font-family: monospace; font-size: 0.85rem; border-radius: 5px;
        }
        .history-entry { margin-bottom: 5px; padding-bottom: 2px; border-bottom: 1px solid #333; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; z-index: 100;
        }
        .modal-content {
            background: var(--dark); border: 2px solid var(--gold);
            padding: 2.5rem; border-radius: 20px; max-width: 500px; text-align: center;
        }
        .btn-exit {
            background: var(--neon-pink, #ff0055); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 1rem;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← Salir del Casino</a>

    <header>
        <h1>¿Puedes ganarle al casino?</h1>
    </header>

    <div class="myth-box">
        <p><strong>MITO:</strong> "Si juego suficiente tiempo, terminaré ganando. Las rachas de mala suerte tienen que acabarse eventualmente."</p>
    </div>

    <main class="game-layout">
        <section class="roulette-section">
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <div class="wheel" id="wheel"></div>
            </div>

            <div class="amount-selector">
                <label>Apuesta ($): </label>
                <input type="number" id="betAmount" value="10" min="10" max="100" step="10">
            </div>

            <div class="betting-controls">
                <p>¿A qué color apuestas?</p>
                <div class="bet-options">
                    <button class="bet-btn bet-red" onclick="play('rojo')">ROJO</button>
                    <button class="bet-btn bet-black" onclick="play('negro')">NEGRO</button>
                    <button class="bet-btn bet-green" onclick="play('verde')">VERDE (0)</button>
                </div>
                <p id="status-text">¡Haz tu apuesta!</p>
                <button onclick="showFinalResults()" class="btn-exit" style="background: #555;">Terminar sesión y ver resultados</button>
            </div>
        </section>

        <section class="stats-panel">
            <div class="balance-card">
                <p>TUS FICHAS</p>
                <h2 id="balance">100</h2>
            </div>
            <h3>Historial de Tiros</h3>
            <div class="history-list" id="history"></div>
        </section>
    </main>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2 id="modalTitle">Fin de la Sesión</h2>
            <div id="modalStats"></div>
            <hr style="margin: 1.5rem 0; opacity: 0.3;">
            <p id="modalConclusion"></p>
            <button onclick="location.reload()" class="bet-btn bet-green">Jugar de nuevo</button>
            <a href="../index.html" style="display:block; margin-top: 10px; color: var(--gold);">Volver al menú principal</a>
        </div>
    </div>

    <script>
        let balance = 100;
        const initialBalance = 100;
        let totalPlays = 0;
        let isSpinning = false;
        let currentRotation = 0;

        const rouletteNumbers = [
            { n: 0, c: 'verde' }, { n: 32, c: 'rojo' }, { n: 15, c: 'negro' }, { n: 19, c: 'rojo' }, 
            { n: 4, c: 'negro' }, { n: 21, c: 'rojo' }, { n: 2, c: 'negro' }, { n: 25, c: 'rojo' }, 
            { n: 17, c: 'negro' }, { n: 34, c: 'rojo' }, { n: 6, c: 'negro' }, { n: 27, c: 'rojo' }, 
            { n: 13, c: 'negro' }, { n: 36, c: 'rojo' }, { n: 11, c: 'negro' }, { n: 30, c: 'rojo' }, 
            { n: 8, c: 'negro' }, { n: 23, c: 'rojo' }, { n: 10, c: 'negro' }, { n: 5, c: 'rojo' }, 
            { n: 24, c: 'negro' }, { n: 16, c: 'rojo' }, { n: 33, c: 'negro' }, { n: 1, c: 'rojo' }, 
            { n: 20, c: 'negro' }, { n: 14, c: 'rojo' }, { n: 31, c: 'negro' }, { n: 9, c: 'rojo' }, 
            { n: 22, c: 'negro' }, { n: 18, c: 'rojo' }, { n: 29, c: 'negro' }, { n: 7, c: 'rojo' }, 
            { n: 28, c: 'negro' }, { n: 12, c: 'rojo' }, { n: 35, c: 'negro' }, { n: 3, c: 'rojo' }, 
            { n: 26, c: 'negro' }
        ];

        // Generar la ruleta visualmente basada en el array de números (Fuente de Verdad Única)
        function initWheel() {
            const wheel = document.getElementById('wheel');
            const sectorDegrees = 360 / 37;
            let gradient = "conic-gradient(";
            
            // Centramos cada sector: el sector i estará entre (i-0.5)*SD y (i+0.5)*SD
            // Esto hace que el índice 0 (verde) esté centrado exactamente arriba (0°)
            rouletteNumbers.forEach((num, i) => {
                const color = num.c === 'verde' ? 'var(--green)' : (num.c === 'rojo' ? 'var(--red)' : 'var(--black)');
                const start = (i * sectorDegrees) - (sectorDegrees / 2);
                const end = ((i + 1) * sectorDegrees) - (sectorDegrees / 2);
                gradient += `${color} ${start}deg ${end}deg${i === 36 ? '' : ','}`;
            });
            
            gradient += ")";
            wheel.style.background = gradient;
        }

        function play(choice) {
            if (isSpinning) return;
            const amount = parseInt(document.getElementById('betAmount').value);
            
            if (isNaN(amount) || amount < 10) {
                alert("La apuesta mínima es de 10 fichas.");
                return;
            }

            if (balance < -900) {
                alert("El casino te ha cortado el crédito. Estás demasiado endeudado.");
                showFinalResults();
                return;
            }

            isSpinning = true;
            document.getElementById('status-text').innerHTML = "¡La bola está girando! <br><span style='font-size:0.8rem; color:var(--gold)'>Sincronizando física visual...</span>";
            
            // 1. Decidimos la fuerza del giro (ángulo aleatorio positivo)
            const extraSpins = (10 + Math.floor(Math.random() * 5)) * 360; 
            const randomAngle = Math.random() * 360;
            currentRotation += extraSpins + randomAngle;
            
            const wheel = document.getElementById('wheel');
            // Rotación Horaria (Derecha)
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // 2. Calculamos el resultado basándonos ÚNICAMENTE en dónde se detuvo el DOM al final
            setTimeout(() => {
                isSpinning = false;
                
                const sectorDegrees = 360 / 37;
                // Ángulo normalizado entre 0 y 360
                const normalizedAngle = currentRotation % 360;
                
                // FÓRMULA MAESTRA:
                // Al girar la rueda hacia la derecha (CW), los números pasan por el puntero fijo (0°) 
                // en orden inverso (0, 36, 35...). 
                // Usamos Math.round sobre la posición invertida para obtener el centro del sector.
                const winningIndex = Math.round((360 - normalizedAngle) / sectorDegrees) % 37;
                const winner = rouletteNumbers[winningIndex];
                
                // Procesamos el resultado con datos frescos
                processResult(choice, amount, winner);
            }, 4000);
        }

        // Inicializar ruleta al cargar
        initWheel();

        function processResult(choice, amount, winner) {
            totalPlays++;
            let win = (choice === winner.c);
            let profit = 0;

            if (win) {
                profit = (winner.c === 'verde') ? amount * 10 : amount;
                balance += profit;
            } else {
                profit = -amount;
                balance += profit;
            }

            const status = document.getElementById('status-text');
            status.innerHTML = `Salió el <strong style="color:${getColorHex(winner.c)}">${winner.n} (${winner.c.toUpperCase()})</strong>. <br> ` + 
                             (win ? `<span style="color:var(--green)">¡GANASTE $${profit}!</span>` : `<span style="color:var(--red)">PERDISTE $${amount}</span>`);

            updateUI(winner, win, amount, profit);
        }

        function getColorHex(c) {
            if (c === 'rojo') return '#ff4d4d';
            if (c === 'negro') return '#888';
            return '#2ecc71';
        }

        function updateUI(winner, win, bet, profit) {
            document.getElementById('balance').innerText = balance;
            
            const entry = document.createElement('div');
            entry.className = 'history-entry';
            entry.innerHTML = `#${totalPlays}: <strong>${winner.n} ${winner.c[0].toUpperCase()}</strong> | Apuesta: ${bet} | ${win ? '✅ +'+profit : '❌ -'+bet}`;
            const history = document.getElementById('history');
            history.prepend(entry);
        }

        function showFinalResults() {
            const modal = document.getElementById('resultModal');
            const stats = document.getElementById('modalStats');
            const conclusion = document.getElementById('modalConclusion');
            
            modal.style.display = 'flex';
            stats.innerHTML = `
                <p>Dinero inicial: <strong>$${initialBalance}</strong></p>
                <p>Dinero final: <strong style="color:${balance < initialBalance ? 'var(--red)' : 'var(--green)'}">$${balance}</strong></p>
                <p>Jugadas totales: <strong>${totalPlays}</strong></p>
            `;
            
            conclusion.innerText = "A largo plazo, el casino siempre gana. El número 0 verde otorga una ventaja estadística a la casa que hace que, matemáticamente, cuanto más tiempo juegues, más probable sea que termines en negativo.";
        }
    </script>
</body>
</html>
